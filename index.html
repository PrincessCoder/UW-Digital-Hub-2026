<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.85);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      #overlay p {
        color: white;
        font-family: sans-serif;
        font-size: 18px;
        text-align: center;
        padding: 0 40px;
        margin-bottom: 30px;
      }
      #overlay button {
        padding: 18px 40px;
        font-size: 20px;
        background: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>

    <a-scene
      mindar-image="imageTargetSrc: targets/artwork.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <img id="artwork" src="assets/artwork_target.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane
          src="#artwork"
          position="0 0 0"
          height="0.5"
          width="0.5"
          material="transparent: true; alphaTest: 0.1">
        </a-plane>
      </a-entity>

    </a-scene>

    <div id="overlay">
      <p>Point your camera at the artwork to reveal the AR experience</p>
      <button onclick="document.getElementById('overlay').style.display='none'">
        Tap to Begin
      </button>
    </div>

  </body>
</html>
